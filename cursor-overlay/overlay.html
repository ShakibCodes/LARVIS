<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Overlay</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #secondary-cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 18px;
        height: 20px;
        pointer-events: none;
        clip-path: polygon(0 0, 100% 50%, 0 100%);
        background: linear-gradient(135deg, #7dd3fc 0%, #3b82f6 60%, #1d4ed8 100%);
        filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.55));
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <div id="secondary-cursor" aria-hidden="true"></div>
    <script src="./overlay.js"></script>
  </body>
</html>
